<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Signage Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: sans-serif;
  }
  #slide-container {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #img-a, #img-b {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    transition: opacity 0.5s ease;
  }
  #img-b { opacity: 0; }
  #video-el {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    display: none;
    background: #000;
  }
  #status {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #fff;
    font-size: 1.5rem;
    gap: 1rem;
    z-index: 10;
  }
  #status .icon { font-size: 3rem; }
  #status .msg { opacity: 0.7; font-size: 1rem; margin-top: 0.5rem; }
</style>
</head>
<body>

<div id="slide-container">
  <img id="img-a" src="" alt="">
  <img id="img-b" src="" alt="">
  <video id="video-el" playsinline muted></video>
</div>

<div id="status">
  <div class="icon">⏳</div>
  <div>Loading your content...</div>
  <div class="msg" id="status-msg"></div>
</div>

<script>
const CONFIG = {
  playlistUrl: "https://script.google.com/macros/s/AKfycbwtvhLHhbR7Q7vvt3ky4Aup0ZOFtJcZNGJLdZUuyiWpbeyzd73S6TjKrm-JbaygSe0R/exec",
  imageDuration: 10,       // seconds per image (when multiple items)
  refreshInterval: 300,    // seconds between playlist refresh checks
  demoPlaylist: [
    { type: "image/jpeg", url: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1280", name: "Demo 1", duration: 0 },
    { type: "image/jpeg", url: "https://images.unsplash.com/photo-1470770903676-69b98201ea1c?w=1280", name: "Demo 2", duration: 0 },
    { type: "image/jpeg", url: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1280", name: "Demo 3", duration: 0 }
  ]
};

// ── State ─────────────────────────────────────────────────────────────────
let playlist = [];
let currentIndex = 0;
let slideTimer = null;
let refreshTimer = null;
let showingA = true;
let wakeLock = null;

// ── DOM refs ──────────────────────────────────────────────────────────────
const imgA      = document.getElementById("img-a");
const imgB      = document.getElementById("img-b");
const videoEl   = document.getElementById("video-el");
const statusDiv = document.getElementById("status");
const statusMsg = document.getElementById("status-msg");

// ── Wake lock ─────────────────────────────────────────────────────────────
async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
    }
  } catch (_) {}
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") requestWakeLock();
});
requestWakeLock();

// Fullscreen on click
document.addEventListener("click", () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
});

// ── Playlist fetch ────────────────────────────────────────────────────────
async function fetchPlaylist() {
  if (!CONFIG.playlistUrl) {
    return CONFIG.demoPlaylist;
  }
  try {
    const url = CONFIG.playlistUrl + "?t=" + Date.now();
    const data = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("GET", url);
      xhr.onload = () => {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(e); }
      };
      xhr.onerror = () => reject(new Error("XHR failed"));
      xhr.send();
    });
    if (Array.isArray(data) && data.length > 0) return data;
  } catch (e) {
    console.warn("Playlist fetch failed:", e);
  }
  return null;
}

// ── Slide display ─────────────────────────────────────────────────────────
function hideStatus() {
  statusDiv.style.display = "none";
}

function showStatus(icon, text, msg) {
  statusDiv.style.display = "flex";
  statusDiv.innerHTML =
    `<div class="icon">${icon}</div><div>${text}</div>` +
    (msg ? `<div class="msg">${msg}</div>` : "");
}

function showSlide(index) {
  if (!playlist.length) return;
  currentIndex = ((index % playlist.length) + playlist.length) % playlist.length;
  const item = playlist[currentIndex];
  const type = (item.type || "").toLowerCase();

  clearTimeout(slideTimer);
  videoEl.pause();
  videoEl.style.display = "none";

  if (type.startsWith("video/")) {
    showVideo(item);
  } else {
    showImage(item);
  }
}

function showImage(item) {
  const next = showingA ? imgB : imgA;
  const curr = showingA ? imgA : imgB;

  next.onload = () => {
    next.style.opacity = "1";
    curr.style.opacity = "0";
    showingA = !showingA;
    hideStatus();

    // Single image: show forever, no timer
    if (playlist.length === 1) return;

    const dur = (item.duration && item.duration > 0) ? item.duration : CONFIG.imageDuration;
    slideTimer = setTimeout(() => showSlide(currentIndex + 1), dur * 1000);
  };
  next.onerror = () => {
    console.warn("Image failed to load:", item.url);
    slideTimer = setTimeout(() => showSlide(currentIndex + 1), 3000);
  };
  next.src = item.url;
}

function showVideo(item) {
  imgA.style.opacity = "0";
  imgB.style.opacity = "0";
  videoEl.style.display = "block";
  hideStatus();

  videoEl.src = item.url;
  videoEl.play().catch(() => {
    slideTimer = setTimeout(() => showSlide(currentIndex + 1), 3000);
  });

  videoEl.onended = () => showSlide(currentIndex + 1);
  videoEl.onerror = () => {
    slideTimer = setTimeout(() => showSlide(currentIndex + 1), 3000);
  };
}

// ── Playlist refresh ──────────────────────────────────────────────────────
async function refreshPlaylist() {
  const newList = await fetchPlaylist();
  if (!newList) return;

  // Single image unchanged — skip visual update
  if (newList.length === 1 && playlist.length === 1 && newList[0].url === playlist[0].url) return;

  const wasEmpty = playlist.length === 0;
  playlist = newList;

  if (wasEmpty) {
    currentIndex = 0;
    showSlide(0);
  } else {
    if (currentIndex >= playlist.length) currentIndex = 0;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  showStatus("⏳", "Loading your content...", "");
  const initial = await fetchPlaylist();

  if (!initial) {
    showStatus("⚠️", "Could not load playlist", "Check your Apps Script URL in player.html");
    return;
  }

  playlist = initial;
  showSlide(0);

  // Periodic refresh
  refreshTimer = setInterval(refreshPlaylist, CONFIG.refreshInterval * 1000);
}

init();
</script>
</body>
</html>
